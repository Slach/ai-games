---
# Docker Compose for AI Game Master
# Environment variables are loaded from .env file
# Note: Uses external spark-network and llama.cpp service

services:
  # ComfyUI - Image/Video/3D generation backend
  comfyui:
    image: comfyui:spark-full
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - HF_XET_HIGH_PERFORMANCE=1
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - DIFFUSERS_CACHE=/root/.cache/huggingface
    ports:
      - "127.0.0.1:8188:8188"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/.cache/comfyui:/opt/ComfyUI/models
      - ./comfyui/user/:/opt/ComfyUI/user
      - ./comfyui/files/:/opt/ComfyUI/output
      - ./comfyui/files/:/opt/ComfyUI/input
      - ./comfyui/web_custom_versions/:/opt/ComfyUI/web_custom_versions/
      - ./comfyui/temp/:/opt/ComfyUI/temp
    command:
      - "/opt/ComfyUI/.venv/bin/python3"
      - "main.py"
      - "--enable-manager"
      - "--preview-method"
      - "auto"
      - "--front-end-version"
      - "Comfy-Org/ComfyUI_frontend@latest"
      - "--listen"
      - "0.0.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - spark-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Game Server API - FastAPI service for game orchestration
  game-server-api:
    image: game-server-api:spark-full
    build:
      dockerfile: Dockerfile.spark
      context: game-server-api/
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - LLM_URL=${LLM_URL:-http://llama.cpp:8090/v1}
      - LLM_API_KEY=${LLM_API_KEY:-placeholder-key-for-llama-cpp}
      - LLM_MODEL=${LLM_MODEL:-unsloth/Qwen3.5-27B}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-32768}
      - COMFYUI_URL=${COMFYUI_URL:-http://comfyui:8188}
      - ONBOARDING_QUESTIONS_COUNT=${ONBOARDING_QUESTIONS_COUNT:-5}
      - ONBOARDING_OPTIONS_COUNT=${ONBOARDING_OPTIONS_COUNT:-5}
      # Web server bind address (0.0.0.0 needed in Docker)
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8000}
      - GAME_MASTER_API_URL=${GAME_MASTER_API_URL:-http://game-server-api:8000}
      - GAME_SCHEDULER_URL=${GAME_SCHEDULER_URL:-http://game-scheduler:8001}
      # CORS origin for browser frontend (Telegram Mini App), e.g. https://t.me
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - GAME_TURN_GOOD_ACTIONS=${GAME_TURN_GOOD_ACTIONS:-3}
      - GAME_TURN_BAD_ACTIONS=${GAME_TURN_BAD_ACTIONS:-1}
      - GAME_TURN_NEUTRAL_ACTIONS=${GAME_TURN_NEUTRAL_ACTIONS:-1}
      - TELEGRAM_BOT_PUSH_URL=http://telegram-bot:9090/push/briefings
      - PUSH_MAX_RETRIES=7
      - PUSH_BASE_DELAY=1.0
    depends_on:
      comfyui:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 6s
      start_interval: 3s
    networks:
      - spark-network
    restart: unless-stopped
    volumes:
      - ./game-server-api/:/app/

  # Telegram Bot - Player interface via Telegram
  telegram-bot:
    image: telegram-bot:spark-full
    build:
      dockerfile: Dockerfile.spark
      context: telegram-bot/
    ports:
      - "127.0.0.1:9090:9090" # Push server for receiving briefings
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_GAME_MASTER_ID=${TELEGRAM_BOT_GAME_MASTER_ID:-}
      - GAME_MASTER_API_URL=${GAME_MASTER_API_URL:-http://game-server-api:8000}
      - GAME_SCHEDULER_URL=${GAME_SCHEDULER_URL:-http://game-scheduler:8001}
      - AI_FSM_DB=/app/bot_storage.db
      - PLAYER_STATE_DB=/app/player_states.db
      - TELEGRAM_SOCKS_PROXY=${TELEGRAM_SOCKS_PROXY:-}
      - PUSH_SERVER_PORT=9090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      game-server-api:
        condition: service_healthy
    networks:
      - spark-network
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - |-
          exec 3<>/dev/tcp/127.0.0.1/9090
          printf 'GET /health HTTP/1.0\r\n\r\n' >&3
          IFS= read -r line <&3
          [[ $$line = *200* ]]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 6s
      start_interval: 3s
    volumes:
      - ./telegram-bot/:/app/

  # Game Scheduler - triggers turn generation via game-server-api
  # Can be run manually for debugging: docker compose run --rm game-scheduler
  game-scheduler:
    image: game-scheduler:spark-full
    build:
      dockerfile: Dockerfile.spark
      context: game-scheduler/
    ports:
      - "${GAME_SCHEDULER_PORT:-8001}:8001"
    depends_on:
      game-server-api:
        condition: service_healthy
    environment:
      - GAME_SERVER_API_URL=${GAME_SERVER_API_URL:-http://game-server-api:8000}
      - GAME_SCHEDULE=${GAME_SCHEDULE:-8h}
      - GAME_SCHEDULER_MODE=${GAME_SCHEDULER_MODE:-scheduled}
      - GAME_SCHEDULER_PORT=8001
      - GAME_ID=${GAME_ID:-default_game}
      - AUTO_ACTION_TIMEOUT_HOURS=${AUTO_ACTION_TIMEOUT_HOURS:-24}
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - spark-network
    restart: unless-stopped
    volumes:
      - ./game-scheduler/:/app/

networks:
  spark-network:
    external: true
