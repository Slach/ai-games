# Docker Compose for AI Game Master
# Environment variables are loaded from .env file
# Note: Uses external spark-network and llama.cpp service

services:
  # Pixelle-MCP Server - Content generation orchestration
  pixelle-mcp:
    image: pixelle:spark-full
    build:
      dockerfile: Dockerfile.spark
      context: pixelle-mcp/
    ports:
      - "127.0.0.1:9004:9004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      comfyui:
        condition: service_healthy
    volumes:
      - ./pixelle-mcp/workflows:/app/data/custom_workflows
    networks:
      - spark-network

  # ComfyUI - Image/Video/3D generation backend
  comfyui:
    image: comfyui:spark-full
    environment:
      - HF_XET_HIGH_PERFORMANCE=1
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - DIFFUSERS_CACHE=/root/.cache/huggingface
    ports:
      - "127.0.0.1:8188:8188"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/.cache/comfyui:/opt/ComfyUI/models
      - ./comfyui/user/:/opt/ComfyUI/user
      - ./comfyui/output/:/opt/ComfyUI/output
      - ./comfyui/input/:/opt/ComfyUI/input
      - ./comfyui/web_custom_versions/:/opt/ComfyUI/web_custom_versions/
    command:
      - "/opt/ComfyUI/.venv/bin/python3"
      - "main.py"
      - "--enable-manager"
      - "--preview-method"
      - "auto"
      - "--front-end-version"
      - "Comfy-Org/ComfyUI_frontend@latest"
      - "--listen"
      - "0.0.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - spark-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Game Master API - FastAPI service for game orchestration
  game-master-api:
    image: game-master-api:spark-full
    build:
      dockerfile: Dockerfile.spark
      context: game-master-api/
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - LLM_URL=${LLM_URL:-http://llama.cpp:8090/v1}
      - LLM_API_KEY=${LLM_API_KEY:-placeholder-key-for-llama-cpp}
      - LLM_MODEL=${LLM_MODEL:-unsloth/Qwen3.5-27B}
      - PIXELLE_MCP_URL=${PIXELLE_MCP_URL:-http://pixelle-mcp:9004/pixelle/mcp}
      - COMFYUI_URL=${COMFYUI_URL:-http://comfyui:8188}
    depends_on:
      pixelle-mcp:
        condition: service_healthy
      comfyui:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - spark-network
    restart: unless-stopped
    volumes:
      - ./game-master-api/:/app/

  # Telegram Bot - Player interface via Telegram
  telegram-bot:
    image: telegram-bot:spark-full
    build:
      dockerfile: Dockerfile.spark
      context: telegram-bot/
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GAME_MASTER_API_URL=${GAME_MASTER_API_URL:-http://game-master-api:8000}
      - AI_FSM_DB=/app/fsm_storage.db
    depends_on:
      game-master-api:
        condition: service_healthy
    networks:
      - spark-network
    restart: unless-stopped
    volumes:
      - ./telegram-bot/:/app/
      - ./fsm_storage.db:/app/fsm_storage.db  # Persist FSM state across restarts

  # Game Master Scheduler - triggers daily generation via game-master-api
  # Can be run manually for debugging: duxocker compose run --rm game-master
  game-master:
    image: game-master:spark-full
    build:
      dockerfile: Dockerfile.spark
      context: game-master/
    depends_on:
      game-master-api:
        condition: service_healthy
    environment:
      - GAME_MASTER_API_URL=${GAME_MASTER_API_URL:-http://game-master-api:8000}
      - GAME_SCHEDULE_TIME=${GAME_SCHEDULE_TIME:-08:00}
      - GAME_MASTER_MODE=${GAME_MASTER_MODE:-scheduled}
      - GAME_LANGUAGE=${GAME_LANGUAGE:-ru}
    networks:
      - spark-network
    restart: unless-stopped
    volumes:
      - ./game-master/:/app/

networks:
  spark-network:
    external: true
